kind = "web"
previewPath = "/"
title = "Bidder Management"
version = "1.0.0"
id = "artifacts/bidder-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20908

[services.development]
run = "pnpm --filter @workspace/bidder-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bidder-app", "run", "build" ]
publicDir = "artifacts/bidder-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20908"
BASE_PATH = "/"
