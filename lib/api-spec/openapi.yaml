openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Bidder Management Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management
  - name: reports
    description: Daily work reports
  - name: feedback
    description: Report feedback
  - name: messages
    description: Chat messages
  - name: presence
    description: Online presence
  - name: profiles
    description: Candidate profiles
  - name: storage
    description: File storage
  - name: stats
    description: Statistics and summaries
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Users
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      parameters:
        - name: role
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # Daily Reports
  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List reports (filtered by role permissions)
      parameters:
        - name: bidderId
          in: query
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createReport
      tags: [reports]
      summary: Submit a daily work report (bidder only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportBody"
      responses:
        "201":
          description: Created report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /reports/{id}:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get a report by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "404":
          $ref: "#/components/responses/NotFound"

  # Feedback on reports
  /reports/{reportId}/feedback:
    get:
      operationId: listFeedback
      tags: [feedback]
      summary: List feedback for a report
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of feedback
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Feedback"
    post:
      operationId: createFeedback
      tags: [feedback]
      summary: Post feedback on a report
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeedbackBody"
      responses:
        "201":
          description: Created feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feedback"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # Chat messages
  /messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List recent chat messages
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a chat message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # Presence
  /presence:
    get:
      operationId: getPresence
      tags: [presence]
      summary: Get online users
      responses:
        "200":
          description: List of online users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PresenceUser"
    post:
      operationId: updatePresence
      tags: [presence]
      summary: Update presence (heartbeat)
      responses:
        "200":
          description: Presence updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresenceUpdateResponse"

  # Candidate profiles
  /profiles:
    get:
      operationId: listProfiles
      tags: [profiles]
      summary: List candidate profiles (scoped by role)
      responses:
        "200":
          description: List of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CandidateProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createProfile
      tags: [profiles]
      summary: Create a candidate profile (CHIEF_ADMIN only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfileBody"
      responses:
        "201":
          description: Created profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /profiles/{profileId}:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Get a candidate profile with resumes and access grants
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateProfile"
        "403":
          description: Forbidden
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateProfile
      tags: [profiles]
      summary: Update a candidate profile (CHIEF_ADMIN only)
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteProfile
      tags: [profiles]
      summary: Delete a candidate profile and all its resumes and access grants (CHIEF_ADMIN only)
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /profiles/{profileId}/resumes:
    post:
      operationId: addProfileResume
      tags: [profiles]
      summary: Upload a resume entry to a profile (CHIEF_ADMIN only)
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProfileResumeBody"
      responses:
        "201":
          description: Resume added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResume"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /profiles/{profileId}/resumes/{resumeId}:
    delete:
      operationId: deleteProfileResume
      tags: [profiles]
      summary: Delete a resume entry from a profile (CHIEF_ADMIN only)
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
        - name: resumeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /profiles/{profileId}/access:
    post:
      operationId: grantProfileAccess
      tags: [profiles]
      summary: Grant a bidder access to a profile (admin or manager for their bidders)
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantProfileAccessBody"
      responses:
        "201":
          description: Access granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileAccessGrant"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /profiles/{profileId}/access/{bidderId}:
    delete:
      operationId: revokeProfileAccess
      tags: [profiles]
      summary: Revoke a bidder's access to a profile (admin or manager for their bidders)
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
        - name: bidderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Access revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # Storage
  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/sync:
    post:
      operationId: syncUser
      tags: [users]
      summary: Link a Clerk account to an admin-pre-created user on first login
      description: |
        Fetches the caller's identity from the Clerk API (server-side) and looks for
        a matching pre-provisioned pending user record by verified email. Returns 200
        if found and linked (or already linked). Returns 403 if the caller has not been
        pre-provisioned by an administrator. Does not auto-create new users.
      responses:
        "200":
          description: User found or successfully linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Clerk account has no verified primary email
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Account not provisioned — contact an administrator to get access
        "503":
          description: Clerk API unavailable — retry later

  /storage/public-objects/{filePath}:
    get:
      operationId: getPublicObject
      tags: [storage]
      summary: Serve a public storage object (no auth required)
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
        "404":
          $ref: "#/components/responses/NotFound"

  /storage/objects/{objectPath}:
    get:
      operationId: getObject
      tags: [storage]
      summary: Serve a private stored object (auth + ownership required)
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
            description: Object path identifier (backend uses wildcard matching internally)
      responses:
        "200":
          description: Object content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden – object not owned by caller

  # Stats
  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /stats/reports-summary:
    get:
      operationId: getReportsSummary
      tags: [stats]
      summary: Get reports summary (per bidder / per week)
      responses:
        "200":
          description: Reports summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReportSummaryItem"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok

    User:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [CHIEF_ADMIN, BIDDER_MANAGER, BIDDER]
        managerId:
          type: ["integer", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - clerkId
        - email
        - name
        - role
        - isActive
        - createdAt
        - updatedAt

    CreateUserBody:
      type: object
      properties:
        email:
          type: string
          description: Email address for the new user. Must be unique. On first sign-in the Clerk account is linked by email.
        name:
          type: string
        role:
          type: string
          enum: [CHIEF_ADMIN, BIDDER_MANAGER, BIDDER]
        managerId:
          type: ["integer", "null"]
          description: Required when role is BIDDER – sets the responsible manager
      required:
        - email
        - name
        - role

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [CHIEF_ADMIN, BIDDER_MANAGER, BIDDER]
        managerId:
          type: ["integer", "null"]
        isActive:
          type: boolean

    Report:
      type: object
      properties:
        id:
          type: integer
        bidderId:
          type: integer
        bidderName:
          type: ["string", "null"]
        reportDate:
          type: string
        projectsCount:
          type: integer
        projectsBid:
          type: string
        outcomes:
          type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        feedbackCount:
          type: integer
      required:
        - id
        - bidderId
        - reportDate
        - projectsCount
        - projectsBid
        - outcomes
        - createdAt
        - feedbackCount

    CreateReportBody:
      type: object
      properties:
        reportDate:
          type: string
        projectsCount:
          type: integer
        projectsBid:
          type: string
        outcomes:
          type: string
        notes:
          type: string
      required:
        - reportDate
        - projectsCount
        - projectsBid
        - outcomes

    Feedback:
      type: object
      properties:
        id:
          type: integer
        reportId:
          type: integer
        authorId:
          type: integer
        authorName:
          type: ["string", "null"]
        authorRole:
          type: ["string", "null"]
        content:
          type: string
        createdAt:
          type: string
      required:
        - id
        - reportId
        - authorId
        - content
        - createdAt

    CreateFeedbackBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    Message:
      type: object
      properties:
        id:
          type: integer
        senderId:
          type: integer
        senderName:
          type: ["string", "null"]
        senderRole:
          type: ["string", "null"]
        content:
          type: string
        createdAt:
          type: string
      required:
        - id
        - senderId
        - content
        - createdAt

    SendMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    PresenceUser:
      type: object
      properties:
        userId:
          type: integer
        name:
          type: string
        role:
          type: string
        lastSeenAt:
          type: string
      required:
        - userId
        - name
        - role
        - lastSeenAt

    PresenceUpdateResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok

    ProfileResume:
      type: object
      properties:
        id:
          type: integer
        profileId:
          type: integer
        label:
          type: ["string", "null"]
        resumeObjectPath:
          type: string
        resumeFileName:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - profileId
        - resumeObjectPath
        - createdAt

    ProfileAccessGrant:
      type: object
      properties:
        id:
          type: integer
        profileId:
          type: integer
        bidderId:
          type: integer
        bidderName:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - profileId
        - bidderId
        - createdAt

    CandidateProfile:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: ["string", "null"]
        linkedin:
          type: ["string", "null"]
        github:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        birthDate:
          type: ["string", "null"]
        photoObjectPath:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        skills:
          type: ["string", "null"]
        experience:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        resumes:
          type: array
          items:
            $ref: "#/components/schemas/ProfileResume"
        accessGrants:
          type: array
          items:
            $ref: "#/components/schemas/ProfileAccessGrant"
      required:
        - id
        - firstName
        - lastName
        - createdAt
        - updatedAt
        - resumes
        - accessGrants

    CreateProfileBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        linkedin:
          type: string
        github:
          type: string
        phone:
          type: string
        address:
          type: string
        birthDate:
          type: string
        photoObjectPath:
          type: string
        bio:
          type: string
        skills:
          type: string
        experience:
          type: string
      required:
        - firstName
        - lastName

    UpdateProfileBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        linkedin:
          type: string
        github:
          type: string
        phone:
          type: string
        address:
          type: string
        birthDate:
          type: string
        photoObjectPath:
          type: string
        bio:
          type: string
        skills:
          type: string
        experience:
          type: string

    AddProfileResumeBody:
      type: object
      properties:
        label:
          type: string
        resumeObjectPath:
          type: string
        resumeFileName:
          type: string
      required:
        - resumeObjectPath

    GrantProfileAccessBody:
      type: object
      properties:
        bidderId:
          type: integer
      required:
        - bidderId

    RequestUploadUrlBody:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
      required:
        - name
        - size
        - contentType

    RequestUploadUrlResponse:
      type: object
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
        metadata:
          type: object
          properties:
            name:
              type: string
            size:
              type: number
            contentType:
              type: string
          required:
            - name
            - size
            - contentType
      required:
        - uploadURL
        - objectPath
        - metadata

    DashboardStats:
      type: object
      properties:
        totalUsers:
          type: integer
          description: Total user count (CHIEF_ADMIN only)
        totalBidders:
          type: integer
          description: Scoped bidder count (admin=all, manager=team, bidder=omitted)
        totalManagers:
          type: integer
          description: Manager count (CHIEF_ADMIN only)
        reportsToday:
          type: integer
        reportsThisWeek:
          type: integer
        onlineNow:
          type: integer
        totalReports:
          type: integer
        totalMessages:
          type: integer
          description: Total messages (CHIEF_ADMIN only)
      required:
        - reportsToday
        - reportsThisWeek
        - onlineNow
        - totalReports

    ReportSummaryItem:
      type: object
      properties:
        bidderId:
          type: integer
        bidderName:
          type: string
        totalReports:
          type: integer
        totalProjects:
          type: integer
        lastReportDate:
          type: ["string", "null"]
      required:
        - bidderId
        - bidderName
        - totalReports
        - totalProjects

